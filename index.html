<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBS Premium Store</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <div class="logo">RBS Store</div>

  <nav class="nav-links">
    <a href="#shop">Shop</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <div class="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<section class="hero">
  <div class="hero-text">
    <h1>Premium Shopping Experience</h1>
    <p>Discover high-quality products built for modern lifestyle.</p>
  </div>
</section>

<section id="shop" class="shop">
  <h2>Featured Products</h2>
  <div class="product-grid"></div>
</section>

<section id="about" class="about">
  <h2>About</h2>
  <p>We build premium shopping experiences with modern UI and smooth UX.</p>
</section>

<section id="contact" class="contact">
  <h2>Contact</h2>
  <p>support@rbsstore.com</p>
</section>

<aside id="cart" class="cart">
  <h3>Your Cart</h3>
  <div id="cart-items"></div>

  <p>Total: $<span id="cart-total">0</span></p>

  <button onclick="clearCart()">Clear Cart</button>
</aside>

<footer>
  <p>© 2026 RBS Store</p>
</footer>

<script src="script.js"></script>

</body>
</html>
