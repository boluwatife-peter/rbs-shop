
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBS Shop</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS File -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">RBS</div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Shop</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <h1>Welcome to RBS Shop</h1>
      <p>Discover products that match your lifestyle.</p>

      <div class="hero-buttons">
        <button>Shop Now</button>
        <button>Learn More</button>
      </div>
    </div>

    <div class="hero-image">
      <img src="https://via.placeholder.com/400" alt="Hero Image">
    </div>
  </section>

  <!-- SHOP -->
  <section class="shop">
    <h2>Our Products</h2>

    <div class="product-grid">
      <div class="product-card">
        <h3>Product 1</h3>
      </div>

      <div class="product-card">
        <h3>Product 2</h3>
      </div>

      <div class="product-card">
        <h3>Product 3</h3>
      </div>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="about">
    <h2>About Us</h2>
    <p>We are a modern shop focused on quality products and user experience.</p>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 RBS Shop. All rights reserved.</p>
  </footer>

</body>
</html>
